spring:
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:menumiledb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:argusadmin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtbG9uZy1kZXZlbG9wbWVudC1qd3Qtc2VjcmV0LWtleS1mb3ItbWVudW1pbGUtcGxhdGZvcm0=}
  accessTokenExpirationMs: 86400000 # 24 hours
  refreshTokenExpirationMs: 604800000 # 7 days

logging:
  level:
    org.springframework.security: DEBUG

